name: Trigger auto deployment for mentomania-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/mentomania-api-AutoDeployTrigger-9b3ea53c-bdea-409a-bfb9-c6703951bac3.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MENTOMANIAAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MENTOMANIAAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MENTOMANIAAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: mentorhubacr9692.azurecr.io
          registryUsername: ${{ secrets.MENTOMANIAAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MENTOMANIAAPI_REGISTRY_PASSWORD }}
          containerAppName: mentomania-api
          resourceGroup: mentomania-backend
          imageToBuild: mentorhubacr9692.azurecr.io/mentomania-api:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



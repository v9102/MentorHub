<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>MentoMania - Meeting</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/7.13.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/7.13.1/firebase-firestore.js"></script>

    <!-- Initialize Firebase -->
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyC9K2EMLewGa1zU2HfbHb2nQjx7zGCsDow",
            authDomain: "mentomania-17f5e.firebaseapp.com",
            projectId: "mentomania-17f5e",
            storageBucket: "mentomania-17f5e.firebasestorage.app",
            messagingSenderId: "933315404300",
            appId: "1:933315404300:web:8bfdb063cac01e2c1b0429",
            measurementId: "G-XJ7XS8YMYK"
        };
        firebase.initializeApp(firebaseConfig);
    </script>

    <!-- Main Styles -->
    <link rel="stylesheet" type="text/css" href="main.css">
</head>

<body>
    <!-- Pre-join Screen (Green Room) -->
    <div id="green-room" class="full-screen-overlay active">
        <h1 class="room-title">Ready to join?</h1>
        <div class="green-room-content">
            <div class="video-preview-container" id="video-preview"></div>
            <div class="join-controls">
                <button class="btn btn-primary" id="greenRoomJoinBtn">Join Now</button>
                <div class="preview-actions">
                    <button class="btn btn-icon btn-dark" id="previewMicBtn"><i class="material-icons">mic</i></button>
                    <button class="btn btn-icon btn-dark" id="previewCamBtn"><i class="material-icons">videocam</i></button>
                    <button class="btn btn-icon btn-dark" id="previewBlurBtn"><i class="material-icons">blur_on</i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Meeting Interface -->
    <main class="app-container" id="main-meeting" style="display: none;">

        <!-- Header Bar -->
        <header class="meeting-header">
            <div class="header-left">
                <img src="/mentomanialogo.png" alt="MentoMania" class="meeting-logo" />
            </div>
            <div class="header-center">
                <span class="session-timer" id="sessionTimer">00:00</span>
            </div>
            <div class="header-right">
                <span class="connection-dot" id="connectionDot"></span>
                <span class="connection-text" id="connectionText">Connected</span>
            </div>
        </header>

        <!-- Video Stage -->
        <div class="video-stage">
            <!-- Main Remote Video -->
            <div class="main-video-wrapper" id="main-video-wrapper">
                <div class="remote-video-box" id="remote-video-container">
                    <div class="video-placeholder" id="remote-placeholder">
                        <div class="placeholder-avatar">
                            <i class="material-icons">person</i>
                        </div>
                        <span>Waiting for participant...</span>
                    </div>
                </div>
                <div class="participant-name-label" id="remote-label" style="display:none;">
                    <span id="remoteParticipantName">Participant</span>
                </div>
            </div>

            <!-- Self PiP -->
            <div class="self-pip" id="self-pip">
                <div class="pip-label">You</div>
            </div>

            <!-- Side Panel (Chat + Participants overlay) -->
            <aside class="side-panel" id="side-panel" style="display:none;">
                <!-- Participants View -->
                <div class="side-panel-tab" id="participants-tab" style="display:none;">
                    <div class="side-panel-header">
                        <h3>People</h3>
                        <button class="btn-close-panel" id="closeParticipantsBtn">
                            <i class="material-icons">close</i>
                        </button>
                    </div>
                    <div class="participants-list" id="participants-list"></div>
                </div>
                <!-- Chat View -->
                <div class="side-panel-tab" id="chat-panel">
                    <div class="side-panel-header">
                        <h3>In-call messages</h3>
                        <button class="btn-close-panel" id="closeChatBtn">
                            <i class="material-icons">close</i>
                        </button>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <p class="chat-notice">Messages can only be seen by people in the call and are deleted when the call ends.</p>
                    </div>
                    <form class="chat-input-area" id="chat-form">
                        <input type="text" id="chat-input" placeholder="Send a message" autocomplete="off" required>
                        <button type="submit" class="btn-send" id="sendChatBtn">
                            <i class="material-icons">send</i>
                        </button>
                    </form>
                </div>
            </aside>
        </div>

        <!-- Controls Bar -->
        <section class="controls-bar" id="buttons">
            <div class="controls-center">
                <button class="ctrl-btn" id="micBtn" title="Toggle Microphone">
                    <div class="ctrl-btn-icon"><i class="material-icons">mic</i></div>
                    <span class="ctrl-btn-label">Mute</span>
                </button>
                <button class="ctrl-btn" id="camBtn" title="Toggle Camera">
                    <div class="ctrl-btn-icon"><i class="material-icons">videocam</i></div>
                    <span class="ctrl-btn-label">Stop</span>
                </button>
                <button class="ctrl-btn" id="screenShareBtn" title="Share Screen">
                    <div class="ctrl-btn-icon"><i class="material-icons">present_to_all</i></div>
                    <span class="ctrl-btn-label">Share</span>
                </button>
                <button class="ctrl-btn" id="blurBtn" title="Background Blur">
                    <div class="ctrl-btn-icon"><i class="material-icons">blur_on</i></div>
                    <span class="ctrl-btn-label">Blur</span>
                </button>
                <button class="ctrl-btn" id="peopleBtn" title="Participants">
                    <div class="ctrl-btn-icon"><i class="material-icons">people</i></div>
                    <span class="ctrl-btn-label">People</span>
                </button>
                <button class="ctrl-btn" id="toggleChatBtn" title="Chat">
                    <div class="ctrl-btn-icon"><i class="material-icons">chat</i></div>
                    <span class="ctrl-btn-label">Chat</span>
                </button>
                <button class="ctrl-btn ctrl-btn-end" id="hangupBtn" title="Leave Call">
                    <div class="ctrl-btn-icon ctrl-icon-end"><i class="material-icons">call_end</i></div>
                    <span class="ctrl-btn-label">End</span>
                </button>
            </div>
        </section>

        <!-- Hidden: room ID for legacy JS compat -->
        <span id="currentRoom" style="display:none;"></span>
    </main>

    <!-- Hidden Lobby actions for legacy compatibility -->
    <div id="lobbyControls" style="display: none;">
        <button id="createBtn">Create Room</button>
        <button id="joinBtn">Join Room</button>
    </div>

    <!-- MediaPipe Selfie Segmentation -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

    <!-- App Logic -->
    <script src="app.js?v=8"></script>
</body>

</html>
